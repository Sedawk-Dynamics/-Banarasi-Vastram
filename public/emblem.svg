<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 196" fill="none" role="img" aria-label="Banarasi Vastram peacock emblem">
  <defs>
    <linearGradient id="bvGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E4C989"/>
      <stop offset="0.55" stop-color="#C6A15B"/>
      <stop offset="1" stop-color="#A9823C"/>
    </linearGradient>
  </defs>

  <!-- Peacock fanned plume: 7 curved feathers -->
  <g stroke="url(#bvGold)" stroke-width="2.2" stroke-linecap="round" fill="none">
    <path d="M80 120 C 116 116 140 104 152 88"/>
    <path d="M80 120 C 108 100 126 82 134 62"/>
    <path d="M80 120 C 96 96 106 70 110 48"/>
    <path d="M80 120 C 80 92 80 66 80 44"/>
    <path d="M80 120 C 64 96 54 70 50 48"/>
    <path d="M80 120 C 52 100 34 82 26 62"/>
    <path d="M80 120 C 44 116 20 104 8 88"/>
  </g>
  <!-- Feather eyes -->
  <g fill="none" stroke="url(#bvGold)" stroke-width="1.8">
    <circle cx="152" cy="88" r="6"/><circle cx="134" cy="62" r="6"/>
    <circle cx="110" cy="48" r="6"/><circle cx="80" cy="44" r="6.5"/>
    <circle cx="50" cy="48" r="6"/><circle cx="26" cy="62" r="6"/><circle cx="8" cy="88" r="6"/>
  </g>
  <g fill="#A9823C">
    <circle cx="152" cy="88" r="2.3"/><circle cx="134" cy="62" r="2.3"/>
    <circle cx="110" cy="48" r="2.3"/><circle cx="80" cy="44" r="2.6"/>
    <circle cx="50" cy="48" r="2.3"/><circle cx="26" cy="62" r="2.3"/><circle cx="8" cy="88" r="2.3"/>
  </g>

  <!-- Body: elegant almond plume -->
  <path d="M80 104 C 92 118 98 134 98 146 C 98 160 90 170 80 170 C 70 170 62 160 62 146 C 62 134 68 118 80 104 Z"
        fill="url(#bvGold)"/>
  <!-- body vein -->
  <path d="M80 118 L 80 160 M80 132 C 74 136 71 142 71 148 M80 132 C 86 136 89 142 89 148"
        stroke="#8C6A2E" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Neck -->
  <path d="M80 108 C 77 96 76 86 80 78" stroke="url(#bvGold)" stroke-width="3.6" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <circle cx="80" cy="72" r="6.6" fill="url(#bvGold)"/>
  <!-- Beak -->
  <path d="M86 72 l 6 -1 l -5 4 Z" fill="#A9823C"/>
  <!-- Crest -->
  <g stroke="url(#bvGold)" stroke-width="1.6" stroke-linecap="round">
    <path d="M80 66 L 73 56"/><path d="M80 65 L 80 53"/><path d="M80 66 L 87 56"/>
  </g>
  <g fill="url(#bvGold)">
    <circle cx="73" cy="55" r="2.2"/><circle cx="80" cy="52" r="2.4"/><circle cx="87" cy="55" r="2.2"/>
  </g>

  <!-- Lotus pedestal -->
  <g fill="url(#bvGold)">
    <path d="M80 176 C 73 186 60 190 51 188 C 60 194 73 193 80 185 C 87 193 100 194 109 188 C 100 190 87 186 80 176 Z"/>
  </g>
</svg>
